<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />

            <div class="welcome">
                <h1>Olá, meu nome é <span class="nome">Vinicius.</span><h1>
                <h2>Sou programador</h2>
                <span class="animated"></span>
            </div>

            <div class="buttonBlock">
              <button class="button-welcome"> <a href="#"> Welcome </a></button>
            </div>
          
        </section>
    </main>
